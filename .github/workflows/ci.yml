name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-caching: true
          python-version: "3.13"
      - run: uv sync --locked --group dev
      - name: Lint with ruff
        run: uv run ruff check .
      - name: Check formatting with ruff
        run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-caching: true
          python-version: "3.13"
      - run: uv sync --locked --group dev
      - name: Type check with mypy
        run: uv run mypy kbox

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-caching: true
          python-version: "3.13"
      - run: uv sync --locked --group dev
      - name: Run tests
        run: uv run pytest -v
