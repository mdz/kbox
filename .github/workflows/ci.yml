name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-caching: true
          python-version: "3.13"
      - run: uv sync --locked --group dev
      - name: Lint with ruff
        run: uv run ruff check .
      - name: Check formatting with ruff
        run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-caching: true
          python-version: "3.13"
      - run: uv sync --locked --group dev
      - name: Type check with mypy
        run: uv run mypy kbox

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-caching: true
          python-version: "3.13"
      - run: uv sync --locked --group dev
      - name: Run tests
        run: uv run pytest -v

  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium webkit

      - name: Run E2E tests
        run: uv run pytest -m e2e -v

  gstreamer:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t kbox-test .

      - name: Run GStreamer tests
        run: docker run --rm kbox-test uv run pytest -m gstreamer -v
